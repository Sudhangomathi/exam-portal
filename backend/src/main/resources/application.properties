spring.application.name=exam-portal
server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/exam_portal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS (Allowed Origins for React)
spring.web.cors.allowed-origins=http://localhost:5173
